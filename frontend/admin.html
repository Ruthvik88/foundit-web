<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoundIt Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 80px; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .admin-table-container { background: var(--surface-0); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        th { background: var(--surface-1); color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        .action-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .action-btn:hover { background: var(--surface-hover); }
        .action-btn.delete { color: #f87171; }
        .action-btn.delete:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); }
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--surface-0); padding: 32px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; margin-bottom: 16px; }
        .search-input { min-width: 300px; }
    </style>
</head>
<body>
    <header class="global-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-text">FoundIt Admin</span>
            </div>
            <div class="header-right">
                <button class="auth-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </header>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="margin-bottom: 24px;">Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Admin Password" class="search-bar" style="border: 1px solid var(--border); background: var(--surface-1); padding: 12px 16px; border-radius: 8px; width: calc(100% - 32px);">
            <button id="loginSubmit" class="submit-btn" style="width: 100%;">Enter Dashboard</button>
            <p id="loginError" style="color: #f87171; margin-top: 12px; display: none; font-size: 0.9rem;">Incorrect password</p>
        </div>
    </div>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Items Dashboard</h2>
            <div class="search-bar search-input">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="adminSearch" placeholder="Search title or location...">
            </div>
        </div>

        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="7" style="text-align: center; padding: 24px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'foundit_admin_2026';
        const API_BASE = 'https://foundit-web.onrender.com';
        
        const loginOverlay = document.getElementById('loginOverlay');
        const loginSubmit = document.getElementById('loginSubmit');
        const adminPassword = document.getElementById('adminPassword');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminTableBody = document.getElementById('adminTableBody');
        const adminSearch = document.getElementById('adminSearch');

        let allItems = [];

        function checkAuth() {
            if (sessionStorage.getItem('admin_auth') === 'true') {
                loginOverlay.style.display = 'none';
                fetchAdminItems();
            } else {
                loginOverlay.style.display = 'flex';
            }
        }

        loginSubmit.addEventListener('click', () => {
            if (adminPassword.value === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_auth', 'true');
                loginOverlay.style.display = 'none';
                loginError.style.display = 'none';
                fetchAdminItems();
            } else {
                loginError.style.display = 'block';
            }
        });

        adminPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginSubmit.click();
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('admin_auth');
            adminPassword.value = '';
            loginOverlay.style.display = 'flex';
        });

        async function fetchAdminItems() {
            try {
                const res = await fetch(`${API_BASE}/api/items?status=all&limit=100`);
                if (!res.ok) throw new Error('Failed to fetch items');
                const data = await res.json();
                allItems = data.items || data; // Handle both pagination format and simple array format
                renderTable();
            } catch (err) {
                console.error(err);
                adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #f87171;">Failed to load items</td></tr>';
            }
        }

        function renderTable(filterQuery = '') {
            const query = filterQuery.toLowerCase();
            const filtered = allItems.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.location.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                adminTableBody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No items found</td></tr>';
                return;
            }

            adminTableBody.innerHTML = filtered.map(item => `
                <tr>
                    <td style="font-weight: 500;">${escapeHtml(item.title)}</td>
                    <td><span class="item-status ${item.type}" style="position: static;">${item.type}</span></td>
                    <td style="text-transform: capitalize;">${item.category}</td>
                    <td>${escapeHtml(item.location)}</td>
                    <td>
                        <span style="display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: ${
                            item.status === 'active' ? 'rgba(34, 197, 94, 0.1)' : 
                            item.status === 'claimed' ? 'rgba(99, 102, 241, 0.1)' : 'rgba(156, 163, 175, 0.1)'
                        }; color: ${
                            item.status === 'active' ? '#22c55e' : 
                            item.status === 'claimed' ? 'var(--primary)' : 'var(--text-secondary)'
                        }; text-transform: uppercase; font-weight: 600;">
                            ${item.status}
                        </span>
                    </td>
                    <td>${new Date(item.date_reported).toLocaleDateString()}</td>
                    <td>
                        <div style="display: flex; gap: 8px;">
                            <button class="action-btn" onclick="expireItem(${item.id})" ${item.status === 'expired' ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>Expire</button>
                            <button class="action-btn delete" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        adminSearch.addEventListener('input', (e) => {
            renderTable(e.target.value);
        });

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            try {
                const res = await fetch(`${API_BASE}/api/items/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-key': ADMIN_PASSWORD }
                });
                if (res.ok) {
                    allItems = allItems.filter(i => i.id !== id);
                    renderTable(adminSearch.value);
                } else {
                    alert('Failed to delete item');
                }
            } catch (err) {
                console.error(err);
                alert('Error deleting item');
            }
        }

        async function expireItem(id) {
            if (!confirm('Mark this item as expired?')) return;
            try {
                const res = await fetch(`${API_BASE}/api/items/${id}/expire`, {
                    method: 'PATCH',
                    headers: { 'x-admin-key': ADMIN_PASSWORD }
                });
                if (res.ok) {
                    const item = allItems.find(i => i.id === id);
                    if (item) item.status = 'expired';
                    renderTable(adminSearch.value);
                } else {
                    alert('Failed to expire item');
                }
            } catch (err) {
                console.error(err);
                alert('Error expiring item');
            }
        }

        function escapeHtml(value = '') {
            return String(value).replace(/[&<>"']/g, (character) => {
                const entities = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return entities[character];
            });
        }

        // Initialize Dark mode if pref exists
        if (localStorage.getItem('cc_pref_darkmode') === 'true') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        checkAuth();
    </script>
</body>
</html>
